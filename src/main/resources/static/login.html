<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <style>
        body { font-family: Arial, "Microsoft YaHei", sans-serif; padding: 30px; }
        .card { max-width: 520px; border: 1px solid #ddd; border-radius: 8px; padding: 20px; }
        label { display: block; margin-top: 12px; }
        input { width: 100%; padding: 8px; margin-top: 6px; box-sizing: border-box; }
        button { margin-top: 16px; padding: 10px 14px; cursor: pointer; }
        .msg { margin-top: 12px; color: #333; }
        .error { color: #d00; }
        a { display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>
<div class="card">
    <h1>登录</h1>

    <label>账号</label>
    <input id="username" type="text" placeholder="请输入账号（默认 admin）"/>

    <label>密码</label>
    <input id="password" type="password" placeholder="请输入密码（默认 123）"/>

    <button onclick="doLogin()">登录</button>

    <div id="msg" class="msg"></div>

    <a href="/register.html">没有账号？去注册</a>
</div>

<script>
    async function doLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include', // 使用 cookie/session
            body: JSON.stringify({ username, password })
        });

        const json = await res.json();
        const msg = document.getElementById('msg');

        if (json.code === 200) {
            msg.className = 'msg';
            msg.textContent = '登录成功，欢迎回来：' + json.data.username;
        } else {
            msg.className = 'msg error';
            msg.textContent = '登录失败：' + json.msg;
        }
    }
</script>
</body>
</html>
