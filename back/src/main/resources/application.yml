server:
  port: 3000

spring:
  application:
    name: iris-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/iris_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.iris.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.example.iris: info
    org.mybatis: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
